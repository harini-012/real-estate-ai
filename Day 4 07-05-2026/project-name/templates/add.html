<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI Real Estate Voice Assistant</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#eceff1;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    /* ================= LOGIN ================= */

    .login-box{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      width:320px;
      padding:25px;
      border-radius:15px;
      display:flex;
      flex-direction:column;
      gap:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .login-box h2{
      text-align:center;
      margin-bottom:10px;
    }

    .login-box input{
      padding:12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .login-box button{
      padding:12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      cursor:pointer;
      font-size:15px;
    }

    .login-box button:hover{
      background:#0056b3;
    }

    /* ================= CHAT ================= */

    .chat-container{
      width:420px;
      height:90vh;
      background:white;
      border-radius:15px;
      overflow:hidden;
      display:none;
      flex-direction:column;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    .chat-header{
      background:#007bff;
      color:white;
      padding:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .chat-body{
      flex:1;
      padding:15px;
      overflow-y:auto;
      background:#f5f7fb;
    }

    .message{
      margin-bottom:15px;
      display:flex;
      flex-direction:column;
    }

    .user-message{
      align-items:flex-end;
    }

    .bot-message{
      align-items:flex-start;
    }

    .bubble{
      max-width:85%;
      padding:14px;
      border-radius:15px;
      line-height:1.6;
      font-size:15px;
    }

    .user-message .bubble{
      background:#007bff;
      color:white;
      border-bottom-right-radius:5px;
    }

    .bot-message .bubble{
      background:white;
      color:#333;
      border:1px solid #ddd;
      border-bottom-left-radius:5px;
    }

    /* ================= CONTROLS ================= */

    .controls{
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      border-top:1px solid #eee;
    }

    select{
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
    }

    .input-row input{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .input-row button{
      padding:12px 15px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      cursor:pointer;
      font-size:14px;
    }

    .input-row button:hover{
      background:#0056b3;
    }

  </style>
</head>

<body>

  <!-- ================= LOGIN ================= -->

  <div class="login-box" id="loginBox">

    <h2>User Login</h2>

    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    />

    <input
      type="text"
      id="mobile"
      placeholder="Enter Mobile"
    />

    <input
      type="text"
      id="city"
      placeholder="Enter City"
    />

    <button onclick="registerUser()">
      Continue
    </button>

  </div>

  <!-- ================= CHAT ================= -->

  <div class="chat-container">

    <div class="chat-header">
      AI Real Estate Assistant
    </div>

    <div class="chat-body" id="chatBody">

      <div class="message bot-message">
        <div class="bubble">
          Hello 👋<br><br>
          You can:
          <br>
          • Find PGs
          <br>
          • Track visits
          <br>
          • Get recommendations
          <br>
          • Speak or type
        </div>
      </div>

    </div>

    <!-- ================= CONTROLS ================= -->

    <div class="controls">

      <select id="langSelect">
        <option value="en-IN">English</option>
        <option value="ta-IN">Tamil</option>
        <option value="hi-IN">Hindi</option>
        <option value="te-IN">Telugu</option>
        <option value="kn-IN">Kannada</option>
      </select>

      <div class="input-row">

        <input
          type="text"
          id="textInput"
          placeholder="Type message..."
        />

        <button onclick="sendText()">
          Send
        </button>

        <button onclick="startVoice()">
          🎤
        </button>
        <button onclick="logoutUser()">
  Logout
</button>

      </div>

    </div>

  </div>

  <!-- ================= SCRIPT ================= -->

  <script>

  let currentUserId = null;

  // ================= AUTO LOGIN =================

  // ================= AUTO LOGIN =================

window.onload = async () => {

  const savedUserId =
    sessionStorage.getItem("userId");

  // NO USER ID
  if(!savedUserId){

    document.getElementById("loginBox")
      .style.display = "flex";

    document.querySelector(".chat-container")
      .style.display = "none";

    return;
  }

  try{

    const response = await fetch(
      "http://127.0.0.1:5000/check-user/" + savedUserId
    );

    const data = await response.json();

    // USER EXISTS
    if(data.exists){

      currentUserId = savedUserId;

      document.getElementById("loginBox")
        .style.display = "none";

      document.querySelector(".chat-container")
        .style.display = "flex";
    }

    // USER DOES NOT EXIST
    else{

      sessionStorage.removeItem("userId");

      alert("User not found. Please login again.");

      document.getElementById("loginBox")
        .style.display = "flex";

      document.querySelector(".chat-container")
        .style.display = "none";
    }

  }catch(err){

    console.log(err);

    alert("Server error");
  }
};
// ================= REGISTER =================

async function registerUser(){

  const name =
    document.getElementById("name").value;

  const mobile =
    document.getElementById("mobile").value;

  const city =
    document.getElementById("city").value;

  if(!name || !mobile || !city){

    alert("Please fill all fields");

    return;
  }

  try{

    const response = await fetch(
      "http://127.0.0.1:5000/register",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          name,
          mobile,
          city
        })
      }
    );

    const data = await response.json();

    currentUserId = data.userId;

    sessionStorage.setItem(
      "userId",
      data.userId
    );

    document.getElementById("loginBox")
      .style.display = "none";

    document.querySelector(".chat-container")
      .style.display = "flex";

  }catch(err){

    console.log(err);

    alert("Server error");
  }
}

  // ================= SEND MESSAGE =================

  async function sendMessage(text){

    const chatBody =
      document.getElementById("chatBody");

    // USER MESSAGE
    const userDiv =
      document.createElement("div");

    userDiv.className =
      "message user-message";

    userDiv.innerHTML =
      `<div class="bubble">${text}</div>`;

    chatBody.appendChild(userDiv);

    chatBody.scrollTop =
      chatBody.scrollHeight;

    try{

      const response = await fetch(
        "http://127.0.0.1:5000/voice-reply",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            userId: currentUserId,
            message: text
          })
        }
      );

      const data = await response.json();

      const botDiv =
        document.createElement("div");

      botDiv.className =
        "message bot-message";

      botDiv.innerHTML =
        `<div class="bubble">${data.reply}</div>`;

      chatBody.appendChild(botDiv);

      // AUDIO
      if(data.audio){

        const audio = new Audio(
          "http://127.0.0.1:5000" + data.audio
        );

        audio.play();
      }

      chatBody.scrollTop =
        chatBody.scrollHeight;

    }catch(err){

      console.log(err);

      const errDiv =
        document.createElement("div");

      errDiv.className =
        "message bot-message";

      errDiv.innerHTML =
        `<div class="bubble">
          ⚠️ Could not connect to server
        </div>`;

      chatBody.appendChild(errDiv);
    }
  }

  // ================= SEND TEXT =================

  function sendText(){

    const input =
      document.getElementById("textInput");

    const text =
      input.value.trim();

    if(!text) return;

    sendMessage(text);

    input.value = "";
  }

  // ================= VOICE =================

  async function startVoice(){

    const selectedLang =
      document.getElementById("langSelect").value;

    const recognition =
      new (
        window.SpeechRecognition ||
        window.webkitSpeechRecognition
      )();

    recognition.lang = selectedLang;

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.onresult = async event => {

      const text =
        event.results[0][0].transcript;

      sendMessage(text);
    };

    recognition.onerror = err => {

      console.log(err);

      alert(
        "Voice Error: " + err.error
      );
    };

    recognition.start();
  }

  // ================= LOGOUT =================

  function logoutUser() {

    sessionStorage.removeItem("userId");

    currentUserId = null;

    document.querySelector(".chat-container")
      .style.display = "none";

    document.getElementById("loginBox")
      .style.display = "flex";

    alert("Logged out successfully");
  }

</script>

</body>
</html>
